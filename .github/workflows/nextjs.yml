# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # You may remove this line if you want to manage the configuration yourself.
          static_site_generator: next
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .next/cache/fetch-cache
            .next/build-manifest.json
            .next/prerender-manifest.json
          key: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('next.config.*') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build with Next.js
        run: |
          echo "::group::Next.js build"
          yarn next build --turbo
          echo "::endgroup::"
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      - name: Build sitemap and robots.txt
        run: yarn next-sitemap
      - name: Verify export output
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing"
            exit 1
          fi
      - name: Check export size
        run: |
          size=$(du -sm dist | cut -f1)
          if [ "$size" -lt 1 ]; then
            echo "❌ dist folder unexpectedly small"
            exit 1
          fi
      - name: Verify SEO files in export
        run: |
          missing=0
          [ -f "dist/sitemap.xml" ] || { echo "❌ sitemap.xml missing"; missing=1; }
          [ -f "dist/robots.txt" ] || { echo "❌ robots.txt missing"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1
      - name: Verify sitemap has URLs
        run: |
          count=$(grep -c "<loc>" dist/sitemap.xml || true)
          if [ "$count" -eq 0 ]; then
            echo "❌ sitemap.xml contains no URLs"
            exit 1
          fi
          echo "✅ sitemap.xml contains $count URLs"
      - name: Install XML tools
        run: sudo apt-get install -y libxml2-utils
      - name: Validate RSS/Atom feeds
        run: |
          xmllint --noout public/rss.xml
          xmllint --noout public/atom.xml
          xmllint --noout dist/sitemap.xml
      - name: Validate JSON Feed
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/feed.json','utf8'))"
      - name: Generate build summary
        run: |
          size=$(du -sh dist | cut -f1)
          pages=$(grep -c "<loc>" dist/sitemap.xml || true)

          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Export Size | $size |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap URLs | $pages |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Commit | $GITHUB_SHA |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Static export successfully built and validated." >> $GITHUB_STEP_SUMMARY
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Validate deployment
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: deploy
    steps:
      - name: Validate sitemap and robots
        run: |
          base="https://www.audeos.com"

          echo "Checking robots.txt..."
          curl --max-time 10 --fail-with-body "$base/robots.txt"

          echo "Checking sitemap.xml..."
          curl --max-time 10 --fail-with-body "$base/sitemap.xml"
      - name: Check live RSS feed links
        run: |
          echo "Fetching live RSS feed..."
          feed=$(curl -s https://www.audeos.com/rss.xml)

          if [ -z "$feed" ]; then
            echo "RSS feed empty or failed to download"
            exit 1
          fi

          urls=$(echo "$feed" | grep -oP '(?<=<link>)[^<]+' | grep '^https' | sort -u)

          failed=0
          echo "$urls" | xargs -n1 -P8 -I{} bash -c '
          status=$(curl --max-time 10 -o /dev/null -s -w "%{http_code}" "{}")
          if [ "$status" != "200" ]; then
            echo "Broken link: {} (status $status)"
            exit 1
          fi
          ' || failed=1

          exit $failed
      - name: Deployment summary
        run: |
          echo "## 🌍 Deployment Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Site URL: https://www.audeos.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checks performed:" >> $GITHUB_STEP_SUMMARY
          echo "- robots.txt reachable" >> $GITHUB_STEP_SUMMARY
          echo "- sitemap.xml reachable" >> $GITHUB_STEP_SUMMARY
          echo "- RSS links return HTTP 200" >> $GITHUB_STEP_SUMMARY
