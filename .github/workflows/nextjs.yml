# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # You may remove this line if you want to manage the configuration yourself.
          static_site_generator: next
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .next/server
            .next/static
          key: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('next.config.*') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build with Next.js
        run: yarn next build
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      - name: Build sitemap and robots.txt
        run: yarn next-sitemap
      - name: Validate RSS/Atom feeds
        run: |
          npx xmllint --noout public/rss.xml
          npx xmllint --noout public/atom.xml
      - name: Validate JSON Feed
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/feed.json','utf8'))"
      - name: Verify export output
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing"
            exit 1
          fi
      - name: Verify SEO files in export
        run: |
          missing=0
          [ -f "dist/sitemap.xml" ] || { echo "❌ sitemap.xml missing"; missing=1; }
          [ -f "dist/robots.txt" ] || { echo "❌ robots.txt missing"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
  validate:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Validate sitemap and robots
        run: |
          base="https://www.audeos.com"

          echo "Checking robots.txt..."
          curl -f "$base/robots.txt"

          echo "Checking sitemap.xml..."
          curl -f "$base/sitemap.xml"

          echo "Validating sitemap XML..."
          curl -s "$base/sitemap.xml" | npx xmllint --noout -
      - name: Check live RSS feed links
        run: |
          echo "Fetching live RSS feed..."
          feed=$(curl -s https://www.audeos.com/rss.xml)

          urls=$(echo "$feed" | grep -oP '(?<=<link>)[^<]+' | grep '^https')

          failed=0
          echo "$urls" | xargs -n1 -P8 -I{} bash -c '
          status=$(curl -o /dev/null -s -w "%{http_code}" "{}")
          if [ "$status" != "200" ]; then
            echo "Broken link: {} (status $status)"
            exit 1
          fi
          ' || failed=1

          exit $failed
