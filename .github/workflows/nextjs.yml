# Sample workflow for building and deploying a Next.js site to GitHub Pages
#
# To get started with Next.js see: https://nextjs.org/docs/getting-started
#
name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  NEXT_TELEMETRY_DISABLED: 1

jobs:
  # Test job
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Run unit tests with coverage
        run: yarn test:coverage
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

  # Build job
  build:
    needs: test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: yarn
          cache-dependency-path: yarn.lock
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libxml2-utils
      - name: Setup Pages
        uses: actions/configure-pages@v6
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # You may remove this line if you want to manage the configuration yourself.
          static_site_generator: next
      - name: Restore Next.js build cache
        uses: actions/cache@v5
        with:
          path: |
            .next/cache
            .next/cache/fetch-cache
            .next/build-manifest.json
            .next/prerender-manifest.json
          key: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-${{ hashFiles('next.config.*') }}-${{ hashFiles('package.json') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('yarn.lock') }}-
      - name: Enable Corepack
        run: corepack enable
      - name: Install dependencies
        run: yarn install --immutable
      - name: Build with Next.js
        run: |
          echo "::group::Next.js build"
          start=$(date +%s)
          yarn next build --turbo
          end=$(date +%s)
          echo "BUILD_TIME=$((end-start))" >> $GITHUB_ENV
          echo "::endgroup::"
        env:
          CONTENTFUL_SPACE_ID: ${{ secrets.CONTENTFUL_SPACE_ID }}
          CONTENTFUL_ACCESS_TOKEN: ${{ secrets.CONTENTFUL_ACCESS_TOKEN }}
          SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIFY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
      - name: Build sitemap and robots.txt
        run: yarn next-sitemap
      - name: Verify export output
        run: |
          if [ ! -d "dist" ]; then
            echo "dist folder missing"
            exit 1
          fi
      - name: Check export size
        run: |
          size=$(du -sm dist | cut -f1)
          if [ "$size" -lt 1 ]; then
            echo "❌ dist folder unexpectedly small"
            exit 1
          fi
      - name: Verify SEO files in export
        run: |
          missing=0
          [ -f "dist/sitemap.xml" ] || { echo "❌ sitemap.xml missing"; missing=1; }
          [ -f "dist/robots.txt" ] || { echo "❌ robots.txt missing"; missing=1; }
          [ "$missing" -eq 0 ] || exit 1
      - name: Verify sitemap has URLs
        run: |
          count=$(grep -c "<loc>" dist/sitemap.xml || true)
          if [ "$count" -eq 0 ]; then
            echo "❌ sitemap.xml contains no URLs"
            exit 1
          fi
          echo "✅ sitemap.xml contains $count URLs"
      - name: Validate RSS/Atom feeds
        run: |
          xmllint --noout public/rss.xml
          xmllint --noout public/atom.xml
          xmllint --noout dist/sitemap.xml
      - name: Validate JSON Feed
        run: |
          node -e "JSON.parse(require('fs').readFileSync('public/feed.json','utf8'))"
      - name: Generate build summary
        run: |
          size=$(du -sh dist | cut -f1)
          pages=$(grep -c "<loc>" dist/sitemap.xml || true)

          echo "## 🚀 Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| Node Version | $(node -v) |" >> $GITHUB_STEP_SUMMARY
          mins=$((BUILD_TIME / 60))
          secs=$((BUILD_TIME % 60))
          echo "| Build Time | ${mins}m ${secs}s |" >> $GITHUB_STEP_SUMMARY
          echo "| Export Size | $size |" >> $GITHUB_STEP_SUMMARY
          echo "| Sitemap URLs | $pages |" >> $GITHUB_STEP_SUMMARY
          echo "| Build Commit | $GITHUB_SHA |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Static export successfully built and validated." >> $GITHUB_STEP_SUMMARY
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist
          retention-days: 1

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  # Validate deployment
  validate-core:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check critical endpoints
        run: |
          base="https://www.audeos.com"

          retry() {
            url=$1
            name=$2

            echo "Checking $name..."

            for i in {1..6}; do
              if curl --connect-timeout 5 --max-time 10 --fail-with-body -s "$url" > /dev/null; then
                echo "✅ $name reachable"
                return 0
              fi
              echo "Attempt $i failed. Retrying in 10s..."
              sleep 10
            done

            echo "❌ $name still unreachable after retries"
            exit 1
          }

          retry "$base/robots.txt" "robots.txt"
          retry "$base/sitemap.xml" "sitemap.xml"
          retry "$base/rss.xml" "rss.xml"

  validate-sitemap:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Validate sitemap URLs
        run: |
          echo "Fetching sitemap index..."
          curl -s https://www.audeos.com/sitemap.xml -o sitemap.xml

          echo "Detecting sitemap type..."

          # Extract child sitemaps if this is a sitemap index
          child_sitemaps=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml | grep '/sitemap')

          > all_urls.txt

          if [ -z "$child_sitemaps" ]; then
            echo "Single sitemap detected"
            grep -oP '(?<=<loc>)[^<]+' sitemap.xml >> all_urls.txt
          else
            echo "Sitemap index detected"
            echo "$child_sitemaps"

            while IFS= read -r sitemap; do
              echo "Fetching $sitemap"
              curl -s "$sitemap" | grep -oP '(?<=<loc>)[^<]+' >> all_urls.txt
            done <<< "$child_sitemaps"
          fi

          urls=$(sed '/^\s*$/d' all_urls.txt | grep 'audeos.com')

          if [ -z "$urls" ]; then
            echo "❌ No URLs found in sitemap"
            exit 1
          fi

          echo "Found $(echo "$urls" | wc -l) URLs"

          failed=0

          echo "$urls" | xargs -r -n1 -P8 -I{} bash -c '
            status=$(curl -L --connect-timeout 5 --max-time 10 --retry 2 --retry-delay 2 -o /dev/null -s -w "%{http_code}" "{}")
            if [[ "$status" != "200" && "$status" != "301" && "$status" != "302" ]]; then
              echo "Broken sitemap URL: {} (status $status)"
              exit 1
            fi
          ' || failed=1

          exit $failed

  validate-rss:
    runs-on: ubuntu-latest
    needs: deploy
    steps:
      - name: Check live RSS feed links
        run: |
          echo "Fetching live RSS feed..."
          feed=$(curl -s https://www.audeos.com/rss.xml)

          if [ -z "$feed" ]; then
            echo "RSS feed empty or failed to download"
            exit 1
          fi

          urls=$(echo "$feed" | grep -oP '(?<=<link>)[^<]+' | grep '^https' | sort -u || true)

          if [ -z "$urls" ]; then
            echo "❌ No URLs extracted from RSS"
            exit 1
          fi

          failed=0
          echo "$urls" | xargs -r -n1 -P8 -I{} bash -c '
          status=$(curl -L --connect-timeout 5 --max-time 10 --retry 2 --retry-delay 2 -o /dev/null -s -w "%{http_code}" "{}")
          if [[ "$status" != "200" && "$status" != "301" && "$status" != "302" ]]; then
            echo "Broken link: {} (status $status)"
            exit 1
          fi
          ' || failed=1

          exit $failed

  validate-links:
    runs-on: ubuntu-latest
    needs:
      - validate-core
      - validate-sitemap
      - validate-rss
    steps:
      - name: Check entire site for broken links
        uses: lycheeverse/lychee-action@v2.0.2
        with:
          args: >
            --verbose
            --no-progress
            --max-concurrency 20
            --max-retries 3
            --retry-wait-time 1
            --timeout 10
            --max-redirects 3
            --accept 200,429
            --exclude-mail
            --exclude 'bandcamp.com'
            --exclude 'soundcloud.com'
            --user-agent "Mozilla/5.0 (compatible; LinkChecker/1.0)"
            --base https://www.audeos.com
            --format markdown
            https://www.audeos.com
          output: lychee-report.md
      - name: Add Lychee report to workflow summary
        if: always()
        run: |
          if [ -f lychee-report.md ]; then
            echo "## 🔗 Broken Link Report" >> $GITHUB_STEP_SUMMARY
            cat lychee-report.md >> $GITHUB_STEP_SUMMARY
          else
            echo "## 🔗 Broken Link Report" >> $GITHUB_STEP_SUMMARY
            echo "No report generated." >> $GITHUB_STEP_SUMMARY
          fi
      - name: Deployment summary
        run: |
          echo "## 🌍 Deployment Validation" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Site URL: https://www.audeos.com" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Checks performed:" >> $GITHUB_STEP_SUMMARY
          echo "- robots.txt reachable" >> $GITHUB_STEP_SUMMARY
          echo "- sitemap.xml reachable" >> $GITHUB_STEP_SUMMARY
          echo "- RSS links return HTTP 200" >> $GITHUB_STEP_SUMMARY

  # Lighthouse CI automatically audits:
  # 🚀 Performance
  # 🔎 SEO
  # ♿ Accessibility
  # 🛠 Best practices
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - validate-core
      - validate-sitemap
      - validate-rss
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: Wait for site to stabilize
        run: sleep 30
      - name: Extract URLs for Lighthouse
        id: lighthouse_urls
        run: |
          echo "Fetching sitemap index..."
          curl -s https://www.audeos.com/sitemap.xml -o sitemap.xml

          sitemap_child=$(grep -oP '(?<=<loc>)[^<]+' sitemap.xml | head -n 1)

          echo "Fetching $sitemap_child"
          if [ -z "$sitemap_child" ]; then
            cp sitemap.xml sitemap-child.xml
          else
            curl -s "$sitemap_child" -o sitemap-child.xml
          fi

          echo "Collecting URLs..."

          urls="https://www.audeos.com"
          posts=$(grep -oP '(?<=<loc>)[^<]+' sitemap-child.xml \
            | grep '/post/' \
            | head -n 3)
          urls=$(printf "%s\n%s" "$urls" "$posts")
          echo "URLs selected:"
          echo "$urls"

          {
            echo "urls<<EOF"
            echo "$urls"
            echo "EOF"
          } >> $GITHUB_OUTPUT
      - name: Validate Lighthouse URLs
        run: |
          if [ -z "${{ steps.lighthouse_urls.outputs.urls }}" ]; then
            echo "❌ No URLs extracted for Lighthouse"
            exit 1
          fi
      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          urls: ${{ steps.lighthouse_urls.outputs.urls }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: ./lighthouserc.json
      - name: Deployment summary
        run: |
          echo "## 🔎 Lighthouse Audit Completed" >> $GITHUB_STEP_SUMMARY
          echo "Reports available in workflow artifacts." >> $GITHUB_STEP_SUMMARY
